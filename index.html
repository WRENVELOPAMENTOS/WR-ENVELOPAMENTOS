<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WR ENVELOPAMENTOS</title>

<style>
body {
    font-family: Arial;
    background:#0b0b0b;
    color:white;
    text-align:center;
}

.container {
    background:#1a1a1a;
    padding:20px;
    border-radius:20px;
    width:90%;
    max-width:380px;
    margin:auto;
    margin-top:20px;
}

h2 {color:#00ff88;}

input {
    width:95%;
    padding:10px;
    margin:6px 0;
    border-radius:10px;
    border:none;
    background:#2a2a2a;
    color:white;
}

button {
    margin-top:10px;
    padding:12px;
    width:100%;
    background:#00ff88;
    color:black;
    border:none;
    border-radius:12px;
    font-weight:bold;
}

.result {
    margin-top:15px;
    font-size:17px;
}
</style>
</head>

<body>

<div class="container">
<h2>WR ENVELOPAMENTOS</h2>

<input id="custoMetro" placeholder="Custo por metro (R$)">
<input id="metros" placeholder="Metros usados">
<input id="perda" placeholder="Perda (%)">

<input id="fixoMensal" placeholder="Custo fixo mensal (R$)">
<input id="imposto" placeholder="Impostos (%)">

<button onclick="calcular()">Calcular</button>

<div class="result" id="resultado"></div>

</div>

<script>

function calcular(){

let custoMetro = parseFloat(custoMetro.value) || 0;
let metrosUsados = parseFloat(metros.value) || 0;
let perdaPct = parseFloat(perda.value) || 0;
let fixoMensal = parseFloat(fixoMensal.value) || 0;
let impostoPct = parseFloat(imposto.value) || 0;

// padrão automático (média de serviços no mês)
let mediaServicos = 15;

// material
let material = custoMetro * metrosUsados;

// perda
let materialReal = material * (1 + perdaPct / 100);

// custo fixo diluído automático
let fixoPorServico = fixoMensal / mediaServicos;

// custo total
let custoTotal = materialReal + fixoPorServico;

// preço final com imposto
let precoFinal = custoTotal * (1 + impostoPct / 100);

resultado.innerHTML = `
Custo fixo por serviço (auto): R$ ${fixoPorServico.toFixed(2)} <br><br>
Custo total: R$ ${custoTotal.toFixed(2)} <br><br>
Preço mínimo: R$ ${precoFinal.toFixed(2)}
`;

}

</script>

</body>
</html>
