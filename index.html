<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WR ENVELOPAMENTOS</title>

<style>
body {
    font-family: Arial;
    background:#0b0b0b;
    color:white;
    text-align:center;
}

.container {
    background:#1a1a1a;
    padding:20px;
    border-radius:20px;
    width:90%;
    max-width:380px;
    margin:auto;
    margin-top:20px;
}

h2 {color:red;}

input {
    width:95%;
    padding:10px;
    margin:6px 0;
    border-radius:10px;
    border:none;
    background:#2a2a2a;
    color:white;
}

button {
    margin-top:10px;
    padding:12px;
    width:100%;
    background:red;
    color:white;
    border:none;
    border-radius:12px;
    font-weight:bold;
}

.result {
    margin-top:15px;
    font-size:16px;
}

.alerta {
    margin-top:10px;
    font-weight:bold;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">
<h2>WR ENVELOPAMENTOS</h2>

<input id="custoMetro" placeholder="Custo por metro (R$)">
<input id="metros" placeholder="Metros usados">
<input id="perda" placeholder="Perda (%)">

<input id="fixo" placeholder="Custo fixo por serviço (R$)">
<input id="imposto" placeholder="Impostos (%)">

<input id="lucro" placeholder="Lucro desejado (%)">

<input id="precoCliente" placeholder="Preço que o cliente quer pagar (R$)">

<button onclick="calcular()">Calcular</button>

<div class="result" id="resultado"></div>
<div class="alerta" id="alerta"></div>

</div>

<script>

function calcular(){

let custoMetro = parseFloat(custoMetro.value) || 0;
let metrosUsados = parseFloat(metros.value) || 0;
let perdaPct = parseFloat(perda.value) || 0;
let custoFixo = parseFloat(fixo.value) || 0;
let impostoPct = parseFloat(imposto.value) || 0;
let lucroPct = parseFloat(lucro.value) || 0;
let precoCliente = parseFloat(precoCliente.value) || 0;

// cálculo
let material = custoMetro * metrosUsados;
let materialReal = material * (1 + perdaPct / 100);
let custoTotal = materialReal + custoFixo;

let precoMinimo = custoTotal * (1 + impostoPct / 100);
let precoIdeal = precoMinimo * (1 + lucroPct / 100);

let lucroReal = precoCliente - custoTotal;

// resultado
resultado.innerHTML = `
Custo total: R$ ${custoTotal.toFixed(2)} <br><br>
Preço mínimo: R$ ${precoMinimo.toFixed(2)} <br>
Preço ideal: R$ ${precoIdeal.toFixed(2)} <br><br>
Lucro nesse valor: R$ ${lucroReal.toFixed(2)}
`;

// alerta inteligente
if(precoCliente > 0){

    if(precoCliente < precoMinimo){
        alerta.innerHTML = "⚠️ Você está pagando pra trabalhar";
        alerta.style.color = "orange";
    }
    else if(precoCliente < precoIdeal){
        alerta.innerHTML = "⚠️ Lucro baixo";
        alerta.style.color = "yellow";
    }
    else{
        alerta.innerHTML = "🔥 Preço saudável";
        alerta.style.color = "lightgreen";
    }

}

}

</script>

</body>
</html>
