<script>

function calcular(){

let comp = parseFloat(document.getElementById("comprimento").value) || 0;
let larg = parseFloat(document.getElementById("largura").value) || 0;
let precoM2 = parseFloat(document.getElementById("precoM2").value) || 0;
let perda = parseFloat(document.getElementById("perda").value) || 0;
let horas = parseFloat(document.getElementById("horas").value) || 0;
let lucro = parseFloat(document.getElementById("lucro").value) || 0;
let fixo = parseFloat(document.getElementById("fixo").value) || 0;
let dep = parseFloat(document.getElementById("depreciacao").value) || 7;

let valorHora = 50;

let area = comp * larg;
let material = area * precoM2;
let materialReal = material * (1 + perda/100);
let mao = horas * valorHora;

let base = materialReal + mao + fixo;
let depValor = base * (dep/100);

let total = base + depValor;
let final = total * (1 + lucro/100);

document.getElementById("resultado").innerHTML = `
Área: ${area.toFixed(2)} m²<br><br>
Material: R$ ${materialReal.toFixed(2)}<br>
Mão de obra: R$ ${mao.toFixed(2)}<br>
Depreciação: R$ ${depValor.toFixed(2)}<br><br>

<b>Custo:</b> R$ ${total.toFixed(2)}<br>
<b>Preço final:</b> R$ ${final.toFixed(2)}
`;

}

</script>
